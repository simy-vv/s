<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音声を文字化＆一致判定</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f4f8;
        }
        #output {
            width: 80%;
            height: 100px;
            border: 2px solid #333;
            background: white;
            padding: 10px;
            font-size: 1.5rem;
            overflow-y: auto;
            margin-bottom: 10px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: background-color 0.3s;
        }
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 90%;
        }
        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        #volume {
            font-size: 1.2rem;
            font-weight: bold;
        }
        input, button {
            padding: 12px;
            font-size: 1rem;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        #targetText {
            width: 250px;
            border: 2px solid #007bff;
            text-align: center;
        }
        button {
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            transition: 0.2s;
        }
        button:hover { background-color: #0056b3; }
        #stopBtn { background-color: #dc3545; }
        #stopBtn:hover { background-color: #a71d2a; }
        
        /* 正解・不正解時のアニメーション */
        .correct-flash { animation: flash-green 0.6s ease; }
        .wrong-flash { animation: flash-red 0.6s ease; }

        @keyframes flash-green {
            0% { background-color: #fff; transform: scale(1); }
            50% { background-color: #28a745; transform: scale(1.05); }
            100% { background-color: #fff; transform: scale(1); }
        }
        @keyframes flash-red {
            0% { background-color: #fff; transform: scale(1); }
            50% { background-color: #dc3545; transform: scale(1.05); }
            100% { background-color: #fff; transform: scale(1); }
        }
    </style>
</head>
<body>
    <h1>実習実践トレーニング</h1>
    
    <p>↓ この言葉を言ってください ↓</p>
    <input type="text" id="targetText" value="がんばれ" placeholder="正解の言葉を入力">

    <p>音声認識結果:</p>
    <div id="output">（ここに結果が出ます）</div>
    
    <div class="controls">
        <div id="volume">音量: 0 dB</div>
        
        <div class="input-group">
            <label for="volumeThreshold">判定音量 (dB): </label>
            <input type="number" id="volumeThreshold" value="60">
            
            <button id="startBtn">スタート</button>
            <button id="stopBtn">ストップ</button>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const outputDiv = document.getElementById('output');
        const volumeDiv = document.getElementById('volume');
        const volumeThresholdInput = document.getElementById('volumeThreshold');
        const targetTextInput = document.getElementById('targetText');
        
        let recognition;
        let audioContext;
        let analyser;
        let microphone;
        let javascriptNode;
        let isProcessing = false; 

        // --- 音を鳴らす関数 ---
        function playSound(type) {
            if (!audioContext) return;
            const now = audioContext.currentTime;
            const gain = audioContext.createGain();
            gain.connect(audioContext.destination);

            if (type === 'success') { // ピンポーン
                const osc1 = audioContext.createOscillator();
                const osc2 = audioContext.createOscillator();
                osc1.frequency.setValueAtTime(880, now);
                osc2.frequency.setValueAtTime(659.25, now + 0.3);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 1.0);
                osc1.connect(gain); osc2.connect(gain);
                osc1.start(now); osc1.stop(now + 0.5);
                osc2.start(now + 0.3); osc2.stop(now + 1.0);
            } else { // ブブー（不協和音）
                const osc1 = audioContext.createOscillator();
                const osc2 = audioContext.createOscillator();
                osc1.type = 'sawtooth';
                osc2.type = 'sawtooth';
                osc1.frequency.setValueAtTime(140, now);
                osc2.frequency.setValueAtTime(145, now);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.6);
                osc1.connect(gain); osc2.connect(gain);
                osc1.start(now); osc1.stop(now + 0.6);
                osc2.start(now); osc2.stop(now + 0.6);
            }
        }

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.interimResults = true;
            recognition.continuous = true;

            recognition.onresult = (event) => {
                if (isProcessing) return;

                let transcript = '';
                let isFinal = false;
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                    if (event.results[i].isFinal) isFinal = true;
                }
                outputDiv.textContent = transcript;

                const target = targetTextInput.value.trim();

                // 1. 正解判定（発話の途中で見つかってもOK）
                if (transcript.includes(target) && target !== "") {
                    handleJudge(true);
                } 
                // 2. 不正解判定（言い終わって確定したのに正解が含まれていない場合）
                else if (isFinal && transcript !== "" && !transcript.includes(target)) {
                    handleJudge(false);
                }
            };

            function handleJudge(isCorrect) {
                isProcessing = true;
                recognition.stop();

                if (isCorrect) {
                    playSound('success');
                    outputDiv.classList.add('correct-flash');
                } else {
                    playSound('error');
                    outputDiv.classList.add('wrong-flash');
                }

                setTimeout(() => {
                    outputDiv.textContent = isCorrect ? "正解！" : "ちがうよ！";
                    setTimeout(() => {
                        outputDiv.textContent = "（リセット完了：次をどうぞ）";
                        outputDiv.classList.remove('correct-flash', 'wrong-flash');
                        recognition.start();
                        isProcessing = false;
                    }, 800);
                }, 500);
            }

            // マイクと音量計の開始
            function startAudio(stream) {
                if(!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);
                javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);
                microphone.connect(analyser);
                analyser.connect(javascriptNode);
                javascriptNode.connect(audioContext.destination);

                javascriptNode.onaudioprocess = () => {
                    const array = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(array);
                    let values = 0;
                    for (let i = 0; i < array.length; i++) values += array[i];
                    const decibels = Math.round(values / array.length);
                    volumeDiv.textContent = `音量: ${decibels} dB`;
                    volumeDiv.style.color = decibels > parseInt(volumeThresholdInput.value) ? 'red' : 'black';
                };
            }

            startBtn.addEventListener('click', () => {
                navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
                    if (audioContext && audioContext.state === 'suspended') audioContext.resume();
                    recognition.start();
                    startAudio(stream);
                    startBtn.disabled = true;
                    startBtn.textContent = "実行中...";
                }).catch(() => alert('マイクを許可してください'));
            });

            stopBtn.addEventListener('click', () => {
                location.reload(); // 状態を完全にリセット
            });
        }
    </script>
</body>
</html>
