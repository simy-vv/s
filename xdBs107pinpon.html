<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音声を文字化＆一致判定</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f4f8;
        }
        #output {
            width: 80%;
            height: 100px;
            border: 2px solid #333;
            background: white;
            padding: 10px;
            font-size: 1.5rem;
            overflow-y: auto;
            margin-bottom: 10px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 90%;
        }
        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        #volume {
            font-size: 1.2rem;
            font-weight: bold;
        }
        input, button {
            padding: 12px;
            font-size: 1rem;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        #targetText {
            width: 250px;
            border: 2px solid #007bff;
            text-align: center;
        }
        button {
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            transition: 0.2s;
        }
        button:hover { background-color: #0056b3; }
        #stopBtn { background-color: #dc3545; }
        #stopBtn:hover { background-color: #a71d2a; }
        
        /* 正解時のアニメーション */
        .correct-flash {
            animation: flash 0.6s ease;
        }
        @keyframes flash {
            0% { background-color: #fff; transform: scale(1); }
            50% { background-color: #28a745; transform: scale(1.05); }
            100% { background-color: #fff; transform: scale(1); }
        }
    </style>
</head>
<body>
    <h1>実習実践トレーニング</h1>
    
    <p>↓ この言葉を言ってください ↓</p>
    <input type="text" id="targetText" value="がんばれ" placeholder="正解の言葉を入力">

    <p>音声認識結果:</p>
    <div id="output">（ここに結果が出ます）</div>
    
    <div class="controls">
        <div id="volume">音量: 0 dB</div>
        
        <div class="input-group">
            <label for="volumeThreshold">判定音量 (dB): </label>
            <input type="number" id="volumeThreshold" value="60">
            
            <button id="startBtn">スタート</button>
            <button id="stopBtn">ストップ</button>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const outputDiv = document.getElementById('output');
        const volumeDiv = document.getElementById('volume');
        const volumeThresholdInput = document.getElementById('volumeThreshold');
        const targetTextInput = document.getElementById('targetText');
        
        let recognition;
        let audioContext;
        let analyser;
        let microphone;
        let javascriptNode;
        let isSuccessProcessing = false; // 処理中の重複動作防止用

        // --- ピンポン音を鳴らす関数 (Web Audio API) ---
        function playSuccessSound() {
            if (!audioContext) return;
            const osc1 = audioContext.createOscillator();
            const osc2 = audioContext.createOscillator();
            const gain = audioContext.createGain();

            osc1.type = 'sine';
            osc2.type = 'sine';
            
            const now = audioContext.currentTime;
            osc1.frequency.setValueAtTime(880, now); 
            osc2.frequency.setValueAtTime(659.25, now + 0.3); 
            
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 1.0);

            osc1.connect(gain);
            osc2.connect(gain);
            gain.connect(audioContext.destination);

            osc1.start(now);
            osc1.stop(now + 0.5);
            osc2.start(now + 0.3);
            osc2.stop(now + 1.0);
        }

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.interimResults = true;
            recognition.continuous = true;

            recognition.onresult = (event) => {
                if (isSuccessProcessing) return; // 正解処理中は何もしない

                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                outputDiv.textContent = transcript;

                const target = targetTextInput.value.trim();
                
                // 一致判定
                if (transcript.includes(target) && target !== "") {
                    isSuccessProcessing = true; // 処理開始
                    
                    // 1. ピンポン音を鳴らす
                    playSuccessSound();
                    
                    // 2. 画面を光らせる
                    outputDiv.classList.add('correct-flash');
                    
                    // 3. 音声認識を一旦止めてリセット
                    // 認識を止めることで、現在の「がんばれ」という文字列をクリアする準備をします
                    recognition.stop();

                    setTimeout(() => {
                        // 4. 表示をクリアして再開準備
                        outputDiv.textContent = "（リセット完了：次をどうぞ）";
                        outputDiv.classList.remove('correct-flash');
                        
                        // 5. 認識を再開
                        recognition.start();
                        isSuccessProcessing = false;
                    }, 1500); // 1.5秒後に次へ
                }
            };

            // エラーハンドリング（停止後の自動再開に失敗した時用）
            recognition.onerror = (event) => {
                console.error("Speech Recognition Error:", event.error);
                if (event.error === 'not-allowed') {
                    alert("マイクの使用が許可されていません");
                }
            };

            function startVolumeMeter(stream) {
                if(!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);
                javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);
                analyser.smoothingTimeConstant = 0.8;
                analyser.fftSize = 1024;
                microphone.connect(analyser);
                analyser.connect(javascriptNode);
                javascriptNode.connect(audioContext.destination);

                javascriptNode.onaudioprocess = () => {
                    const array = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(array);
                    let values = 0;
                    for (let i = 0; i < array.length; i++) { values += array[i]; }
                    const average = values / array.length;
                    const decibels = Math.round(average);
                    volumeDiv.textContent = `音量: ${decibels} dB`;
                    const threshold = parseInt(volumeThresholdInput.value);
                    volumeDiv.style.color = decibels > threshold ? 'red' : 'black';
                };
            }

            startBtn.addEventListener('click', () => {
                navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
                    if (audioContext && audioContext.state === 'suspended') {
                        audioContext.resume();
                    }
                    recognition.start();
                    startVolumeMeter(stream);
                    startBtn.disabled = true;
                    startBtn.textContent = "実行中...";
                }).catch((error) => {
                    alert('マイクアクセスを許可してください');
                });
            });

            stopBtn.addEventListener('click', () => {
                recognition.stop();
                if (audioContext) audioContext.close().then(() => {
                    audioContext = null;
                });
                startBtn.disabled = false;
                startBtn.textContent = "スタート";
                outputDiv.textContent = "停止中";
            });
        }
    </script>
</body>
</html>
