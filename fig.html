<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>図形の種類を選ぶ学習</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background: #f9f9f9;
    }
    .shapes-row {
      display: flex;
      justify-content: center;
      margin: 20px 0;
      gap: 20px;
    }
    .shape {
      width: 80px;
      height: 80px;
      display: inline-block;
    }
    .circle {
      background: red;
      border-radius: 50%;
    }
    .square {
      background: blue;
    }
    .triangle {
      width: 0;
      height: 0;
      border-left: 40px solid transparent;
      border-right: 40px solid transparent;
      border-bottom: 80px solid green;
      background: none;
    }
    .option:hover {
      cursor: pointer;
      outline: 4px solid gold;
    }
  </style>
</head>
<body>
  <h2>お手本の図形群</h2>
  <div class="shapes-row" id="sample"></div>

  <h2>同じ種類の図形を選んでください</h2>
  <div class="shapes-row" id="options">
    <div class="shape option circle" data-shape="circle"></div>
    <div class="shape option square" data-shape="square"></div>
    <div class="shape option triangle" data-shape="triangle"></div>
  </div>

  <p id="result" style="font-size: 1.5em; margin-top: 20px;"></p>
  <button onclick="generateQuestion()">次の問題へ</button>

  <script>
    const shapes = ["circle", "square", "triangle"];
    let correctShape = "circle"; // 初期値

    function createShapeElement(shape) {
      const div = document.createElement("div");
      div.classList.add("shape", shape);
      return div;
    }

    function generateQuestion() {
      // 正解の形をランダムに選ぶ
      correctShape = shapes[Math.floor(Math.random() * shapes.length)];

      // お手本図形を更新
      const sample = document.getElementById("sample");
      sample.innerHTML = ""; // クリア
      for (let i = 0; i < 3; i++) {
        sample.appendChild(createShapeElement(correctShape));
      }

      // 結果メッセージをリセット
      document.getElementById("result").textContent = "";
    }

    // 選択肢のクリック処理
    document.querySelectorAll('.option').forEach(option => {
      option.addEventListener('click', () => {
        const selected = option.getAttribute('data-shape');
        const result = document.getElementById('result');
        if (selected === correctShape) {
          result.textContent = "正解です！";
          result.style.color = "green";
        } else {
          result.textContent = "ちがいます。もう一度！";
          result.style.color = "red";
        }
      });
    });

    // 初回出題
    generateQuestion();
  </script>
</body>
</html>
